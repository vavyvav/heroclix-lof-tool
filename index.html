        sizes: "192x192",
        type: "image/svg+xml"
      }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type: 'application/manifest+json'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = url;
  document.currentScript.parentNode.insertBefore(link, document.currentScript);

<!-- Service Worker Registration -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    const swContent = `
const CACHE_NAME = 'hc-lof-v1';
const urlsToCache = [location.href];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(urlsToCache)));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))
  ));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match(e.request))));
});
`;
    const blob = new Blob([swContent], {type: 'application/javascript'});
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl).catch(() => {});
  });
}

<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useRef, useEffect, useMemo } = React;

// ============================================================
// STORAGE LAYER - localStorage fallback + File System Access API
// ============================================================
let _fsDirHandle = null;

const storage = {
  async _fsWrite(name, data) {
    if (!_fsDirHandle) return false;
    try {
      const fh = await _fsDirHandle.getFileHandle(name + ".json", { create: true });
      const writable = await fh.createWritable();
      await writable.write(data);
      await writable.close();
      return true;
    } catch (e) { return false; }
  },
  async _fsRead(name) {
    if (!_fsDirHandle) return null;
    try {
      const fh = await _fsDirHandle.getFileHandle(name + ".json");
      const file = await fh.getFile();
      return await file.text();
    } catch (e) { return null; }
  },
  async _fsDelete(name) {
    if (!_fsDirHandle) return false;
    try { await _fsDirHandle.removeEntry(name + ".json"); return true; }
    catch (e) { return false; }
  },
  async _fsList() {
    if (!_fsDirHandle) return null;
    try {
      const names = [];
      for await (const [name, handle] of _fsDirHandle) {
        if (handle.kind === "file" && name.endsWith(".json")) names.push(name.replace(/\.json$/, ""));
      }
      return names;
    } catch (e) { return null; }
  },
  async get(key) {
    const name = key.replace("hcmap:", "");
    const fsVal = await this._fsRead(name);
    if (fsVal !== null) return { key, value: fsVal };
    const val = localStorage.getItem(key);
    if (val === null) throw new Error("Key not found");
    return { key, value: val };
  },
  async set(key, value) {
    await this._fsWrite(key.replace("hcmap:", ""), value);
    localStorage.setItem(key, value);
    return { key, value };
  },
  async delete(key) {
    await this._fsDelete(key.replace("hcmap:", ""));
    localStorage.removeItem(key);
    return { key, deleted: true };
  },
  async list(prefix) {
    const lsKeys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (!prefix || k.startsWith(prefix)) lsKeys.push(k);
    }
    const fsNames = await this._fsList();
    if (fsNames) {
      const allKeys = new Set(lsKeys);
      for (const n of fsNames) allKeys.add((prefix || "") + n);
      return { keys: [...allKeys], prefix };
    }
    return { keys: lsKeys, prefix };
  },
  get hasFolderMapped() { return !!_fsDirHandle; },
  get folderName() { return _fsDirHandle ? _fsDirHandle.name : null; },
  get isFileSystemSupported() { return typeof window.showDirectoryPicker === "function"; },
  async mapFolder() {
    if (!this.isFileSystemSupported) return false;
    try { _fsDirHandle = await window.showDirectoryPicker({ mode: "readwrite" }); return true; }
    catch (e) { return false; }
  },
  unmapFolder() { _fsDirHandle = null; }
};
window.storage = storage;

// ============================================================
// DYNAMIC CELL SIZE — fits the grid to the screen
// ============================================================
function computeCellSize(cols) {
  const vw = Math.min(window.innerWidth, window.screen.width);
  // On small screens, shrink the cell so we can see ~10 cols without scrolling
  // But cap at 36 for desktop
  const available = vw - 28; // label + padding
  const desired = Math.floor(available / Math.min(cols, 10));
  return Math.max(20, Math.min(36, desired));
}

// ============================================================
// MAP PNG PARSER
// ============================================================
function parseMapImage(imageDataURL) {
  return new Promise((resolve) => {
    const img = new window.Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      canvas.width = img.width; canvas.height = img.height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0);
      const idata = ctx.getImageData(0, 0, img.width, img.height);
      const d = idata.data;
      const W = img.width, H = img.height;
      const px = (x, y) => { const i = (y * W + x) * 4; return [d[i], d[i+1], d[i+2]]; };
      const isDark = (r, g, b) => r < 140 && g < 140 && b < 140 && Math.abs(r-g) < 50 && Math.abs(g-b) < 50;
      const vDark = new Array(W).fill(0), hDark = new Array(H).fill(0);
      for (let x = 0; x < W; x++) for (let y = 0; y < H; y++) {
        const [r, g, b] = px(x, y);
        if (isDark(r, g, b)) { vDark[x]++; hDark[y]++; }
      }
      function findPeaks(scores) {
        const mx = Math.max(...scores);
        const thresh = mx * 0.15;
        const cands = scores.map((s, i) => s > thresh ? i : -1).filter(i => i >= 0);
        if (!cands.length) return [];
        const clusters = [[cands[0]]];
        for (let i = 1; i < cands.length; i++) {
          if (cands[i] - clusters[clusters.length-1].slice(-1)[0] <= 2)
            clusters[clusters.length-1].push(cands[i]);
          else clusters.push([cands[i]]);
        }
        return clusters.map(c => Math.round(c.reduce((a,b)=>a+b,0)/c.length));
      }
      const vPeaks = findPeaks(vDark), hPeaks = findPeaks(hDark);
      function modeGap(peaks) {
        const gaps = {};
        for (let i = 0; i < peaks.length - 1; i++) {
          const g = peaks[i+1] - peaks[i];
          if (g >= 8) gaps[g] = (gaps[g] || 0) + 1;
        }
        let best = 20, bestN = 0;
        for (const [g, n] of Object.entries(gaps)) { if (n > bestN) { bestN = n; best = parseInt(g); } }
        return best;
      }
      const cellW = modeGap(vPeaks), cellH = modeGap(hPeaks);
      const COLS = 16, ROWS = (H > W * 1.2) ? 24 : 16;
      function findGridStart(peaks, cellSize, numCells) {
        let bestStart = peaks[0] || 0, bestScore = 0;
        for (const start of peaks) {
          let score = 0;
          for (let c = 0; c <= numCells; c++) {
            const expected = start + c * cellSize;
            const nearest = peaks.reduce((a, b) => Math.abs(b - expected) < Math.abs(a - expected) ? b : a, peaks[0]);
            if (Math.abs(nearest - expected) <= cellSize * 0.3) score++;
          }
          if (score > bestScore) { bestScore = score; bestStart = start; }
        }
        return bestStart;
      }
      const vStart = findGridStart(vPeaks, cellW, COLS), hStart = findGridStart(hPeaks, cellH, ROWS);
      function classify(r, g, b) {
        const bright = (r + g + b) / 3;
        if (bright > 210 && Math.max(Math.abs(r-g), Math.abs(g-b), Math.abs(r-b)) < 12) return "clear";
        if (bright > 240) return "clear";
        if (g > 170 && g > r + 15 && g > b + 15) return "hindering";
        if (g > 150 && g > r + 10 && g > b + 10 && bright > 150) return "hindering";
        if (r > 180 && r > g + 30 && r > b + 30) return "elevated2";
        if (r > 220 && r > g + 8 && r > b + 8 && g < 215) return "elevated2";
        if (b > r + 5 && b > 200 && g > 200) return "water";
        if (b > r + 15 && b > 180) return "water";
        if (b >= 250 && g >= 250 && r < g) return "water";
        if (r > g && g > b && (r - b) > 15 && bright < 220 && bright > 80) {
          if ((r - g) < 50 && (g - b) < 50) return "blocking";
        }
        if (bright < 120 && Math.max(Math.abs(r-g), Math.abs(g-b)) < 30) return "blocking";
        return "clear";
      }
      const grid = [];
      for (let ri = 0; ri < ROWS; ri++) {
        const row = [];
        for (let ci = 0; ci < COLS; ci++) {
          const x1 = vStart + ci * cellW, x2 = x1 + cellW;
          const y1 = hStart + ri * cellH, y2 = y1 + cellH;
          const cx1 = x1 + Math.floor(cellW / 4), cx2 = x2 - Math.floor(cellW / 4);
          const cy1 = y1 + Math.floor(cellH / 4), cy2 = y2 - Math.floor(cellH / 4);
          let rs = 0, gs = 0, bs = 0, n = 0;
          for (let y = Math.max(0, cy1); y <= Math.min(H - 1, cy2); y++) {
            for (let x = Math.max(0, cx1); x <= Math.min(W - 1, cx2); x++) {
              const [rr, gg, bb] = px(x, y); rs += rr; gs += gg; bs += bb; n++;
            }
          }
          row.push(n > 0 ? classify(rs / n, gs / n, bs / n) : "clear");
        }
        grid.push(row);
      }
      const isWallPx = (r, g, b) => r < 50 && g < 50 && b < 50;
      const walls = [];
      for (let ri = 0; ri < ROWS - 1; ri++) {
        const yEdge = hStart + (ri + 1) * cellH;
        for (let ci = 0; ci < COLS; ci++) {
          const x1 = vStart + ci * cellW, x2 = x1 + cellW;
          let wp = 0, tot = 0;
          for (let x = x1 + 3; x < x2 - 3; x++) {
            for (let dy = -1; dy <= 1; dy++) {
              const yy = yEdge + dy;
              if (yy >= 0 && yy < H) { const [r, g, b] = px(x, yy); if (isWallPx(r, g, b)) wp++; tot++; }
            }
          }
          if (tot > 0 && wp / tot > 0.5) walls.push(ri + "," + ci + "-" + (ri+1) + "," + ci);
        }
      }
      for (let ci = 0; ci < COLS - 1; ci++) {
        const xEdge = vStart + (ci + 1) * cellW;
        for (let ri = 0; ri < ROWS; ri++) {
          const y1 = hStart + ri * cellH, y2 = y1 + cellH;
          let wp = 0, tot = 0;
          for (let y = y1 + 3; y < y2 - 3; y++) {
            for (let dx = -1; dx <= 1; dx++) {
              const xx = xEdge + dx;
              if (xx >= 0 && xx < W) { const [r, g, b] = px(xx, y); if (isWallPx(r, g, b)) wp++; tot++; }
            }
          }
          if (tot > 0 && wp / tot > 0.5) walls.push(ri + "," + ci + "-" + ri + "," + (ci+1));
        }
      }
      resolve({ grid, walls, rows: ROWS, cols: COLS });
    };
    img.src = imageDataURL;
  });
}
window.parseMapImage = parseMapImage;

// ============================================================
// GRID STATE
// ============================================================
let GRID_COLS = 16, GRID_ROWS = 16;

const TERRAIN = {
  clear:    { label: "Clear",      color: "rgba(220,220,200,0.25)", border: "rgba(0,0,0,0.08)",    icon: "" },
  hindering:{ label: "Hindering",  color: "rgba(34,139,34,0.35)",   border: "rgba(34,139,34,0.7)", icon: "🌿" },
  blocking: { label: "Blocking",   color: "rgba(139,90,43,0.6)",    border: "rgba(101,67,33,0.9)", icon: "🧱" },
  elevated2:{ label: "Elevated 2", color: "rgba(200,60,60,0.3)",    border: "rgba(200,60,60,0.7)", icon: "⬆2" },
  elevated3:{ label: "Elevated 3", color: "rgba(180,30,30,0.45)",   border: "rgba(180,30,30,0.8)", icon: "⬆3" },
  water:    { label: "Water",      color: "rgba(30,100,200,0.3)",   border: "rgba(30,100,200,0.6)",icon: "💧" },
};

const WALL_STYLE = { color: "#1a1a1a", width: 4 };

const CHARACTER_COLORS = [
  "#e63946","#457b9d","#2a9d8f","#e9c46a","#f4a261","#6a4c93",
  "#1d3557","#ef476f","#06d6a0","#118ab2",
];

function getElevation(terrain) {
  if (terrain === "elevated2") return 2;
  if (terrain === "elevated3") return 3;
  return 1;
}

function wallKey(r1, c1, r2, c2) {
  const sorted = [[r1,c1],[r2,c2]].sort((a,b) => a[0]-b[0] || a[1]-b[1]);
  return `${sorted[0][0]},${sorted[0][1]}-${sorted[1][0]},${sorted[1][1]}`;
}

function getSquaresBetween(r1, c1, r2, c2) {
  const squares = [];
  const dx = c2-c1, dy = r2-r1;
  const steps = Math.max(Math.abs(dx), Math.abs(dy));
  if (steps === 0) return [];
  const numSamples = steps * 20;
  for (let i = 0; i <= numSamples; i++) {
    const t = i / numSamples;
    const x = c1 + 0.5 + dx * t, y = r1 + 0.5 + dy * t;
    const col = Math.floor(x), row = Math.floor(y);
    if (row >= 0 && row < GRID_ROWS && col >= 0 && col < GRID_COLS) {
      const key = `${row},${col}`;
      if (!squares.find(s => s.key === key)) squares.push({ row, col, key });
    }
  }
  return squares;
}

function checkIntersectsWall(r1, c1, r2, c2, wallSet) {
  const dx = c2-c1, dy = r2-r1;
  const steps = Math.max(Math.abs(dx), Math.abs(dy)) * 30;
  if (steps === 0) return false;
  for (let i = 1; i < steps; i++) {
    const t = i / steps;
    const x = (c1+0.5) + dx*t, y = (r1+0.5) + dy*t;
    const col = Math.floor(x), row = Math.floor(y);
    const fx = x-col, fy = y-row;
    const threshold = 0.05;
    if (fy < threshold && row > 0 && wallSet.has(wallKey(row-1,col,row,col))) return true;
    if (fy > 1-threshold && row < GRID_ROWS-1 && wallSet.has(wallKey(row,col,row+1,col))) return true;
    if (fx < threshold && col > 0 && wallSet.has(wallKey(row,col-1,row,col))) return true;
    if (fx > 1-threshold && col < GRID_COLS-1 && wallSet.has(wallKey(row,col,row,col+1))) return true;
  }
  return false;
}

function findDiagonalIntersections(r1, c1, r2, c2) {
  const intersections = [];
  const dx = c2-c1, dy = r2-r1;
  const steps = Math.max(Math.abs(dx), Math.abs(dy)) * 30;
  if (steps === 0) return intersections;
  for (let i = 1; i < steps; i++) {
    const t = i / steps;
    const x = (c1+0.5)+dx*t, y = (r1+0.5)+dy*t;
    if (Math.abs(x-Math.round(x)) < 0.03 && Math.abs(y-Math.round(y)) < 0.03) {
      const ix = Math.round(x), iy = Math.round(y);
      const movingPosSlope = (dx>0&&dy>0)||(dx<0&&dy<0);
      let sideA, sideB;
      if (movingPosSlope) { sideA={row:iy-1,col:ix}; sideB={row:iy,col:ix-1}; }
      else { sideA={row:iy-1,col:ix-1}; sideB={row:iy,col:ix}; }
      if (sideA.row>=0&&sideA.row<GRID_ROWS&&sideA.col>=0&&sideA.col<GRID_COLS&&
          sideB.row>=0&&sideB.row<GRID_ROWS&&sideB.col>=0&&sideB.col<GRID_COLS) {
        const key = `${iy},${ix}`;
        if (!intersections.find(p => p.key === key)) intersections.push({key,sideA,sideB,iy,ix});
      }
    }
  }
  return intersections;
}

function squareRestrictionLevel(row, col, grid, sourceElev, targetElev, sameElevation) {
  const terrain = grid[row][col];
  if (terrain === "blocking") return 2;
  const sqElev = getElevation(terrain);
  if (sameElevation && sqElev > sourceElev) return 2;
  if (!sameElevation) { const lowerElev = Math.min(sourceElev,targetElev); if (sqElev > lowerElev) return 2; }
  if (terrain === "hindering") return 1;
  return 0;
}

function characterAt(row, col, characters) {
  return characters.find(ch => ch.row===row && ch.col===col) || null;
}

function isOnRim(row, col, grid) {
  const elev = getElevation(grid[row][col]);
  if (elev <= 1) return false;
  for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++) {
    if (dr===0&&dc===0) continue;
    const nr=row+dr, nc=col+dc;
    if (nr>=0&&nr<GRID_ROWS&&nc>=0&&nc<GRID_COLS&&getElevation(grid[nr][nc])<elev) return true;
  }
  return false;
}

function checkIntersectionWallsForSide(intRow, intCol, side, wallSet) {
  const {row,col} = side;
  const edges = [];
  if (intRow===row) edges.push(wallKey(row-1,col,row,col));
  else if (intRow===row+1) edges.push(wallKey(row,col,row+1,col));
  if (intCol===col) edges.push(wallKey(row,col-1,row,col));
  else if (intCol===col+1) edges.push(wallKey(row,col,row,col+1));
  return edges.some(e => wallSet.has(e));
}

function describeSquare(sq, grid, characters, isSource, isTarget) {
  const terrain = grid[sq.row][sq.col];
  const ch = characterAt(sq.row,sq.col,characters);
  let desc = `(${sq.col},${sq.row})`;
  if (ch&&!isSource&&!isTarget) desc += ` [char: ${ch.name}]`;
  if (terrain!=="clear") desc += ` [${TERRAIN[terrain]?.label||terrain}]`;
  return desc;
}

function computeLoF(sourceR,sourceC,targetR,targetC,grid,walls,characters,isSquareIndoor) {
  const _isIndoor = isSquareIndoor || (() => false);
  if (sourceR===targetR&&sourceC===targetC)
    return {result:"clear",reason:"Line of fire to self is always clear",squares:[{row:sourceR,col:sourceC,key:`${sourceR},${sourceC}`}]};
  const squares = getSquaresBetween(sourceR,sourceC,targetR,targetC);
  const wallSet = new Set(walls);
  const sourceElev = getElevation(grid[sourceR][sourceC]);
  const targetElev = getElevation(grid[targetR][targetC]);
  const sameElevation = sourceElev===targetElev;
  const blockingLabel = (row,col) => _isIndoor(row,col) ? "indoor blocking" : "outdoor blocking";

  if (!sameElevation) {
    const higherIsSource = sourceElev>targetElev;
    const higherRow = higherIsSource?sourceR:targetR, higherCol = higherIsSource?sourceC:targetC;
    if (!isOnRim(higherRow,higherCol,grid))
      return {result:"blocked",reason:`Elevated character at (${higherCol},${higherRow}) is not on the rim`,squares};
  }
  if (checkIntersectsWall(sourceR,sourceC,targetR,targetC,wallSet))
    return {result:"blocked",reason:"Crosses a wall (blocking terrain)",squares};

  const diagonalIntersections = findDiagonalIntersections(sourceR,sourceC,targetR,targetC);
  let hindered = false;
  for (const inter of diagonalIntersections) {
    const {sideA,sideB} = inter;
    const isSourceA=sideA.row===sourceR&&sideA.col===sourceC, isTargetA=sideA.row===targetR&&sideA.col===targetC;
    const isSourceB=sideB.row===sourceR&&sideB.col===sourceC, isTargetB=sideB.row===targetR&&sideB.col===targetC;
    let levelA=squareRestrictionLevel(sideA.row,sideA.col,grid,sourceElev,targetElev,sameElevation);
    let levelB=squareRestrictionLevel(sideB.row,sideB.col,grid,sourceElev,targetElev,sameElevation);
    if (!isSourceA&&!isTargetA&&characterAt(sideA.row,sideA.col,characters)) levelA=Math.max(levelA,2);
    if (!isSourceB&&!isTargetB&&characterAt(sideB.row,sideB.col,characters)) levelB=Math.max(levelB,2);
    if (checkIntersectionWallsForSide(inter.iy,inter.ix,sideA,wallSet)) levelA=2;
    if (checkIntersectionWallsForSide(inter.iy,inter.ix,sideB,wallSet)) levelB=2;
    const leastRestrictive=Math.min(levelA,levelB);
    if (leastRestrictive>=2) {
      const descA=describeSquare(sideA,grid,characters,isSourceA,isTargetA);
      const descB=describeSquare(sideB,grid,characters,isSourceB,isTargetB);
      return {result:"blocked",reason:`Diagonal intersection blocked: ${descA} and ${descB}`,squares};
    }
    if (leastRestrictive===1) hindered=true;
  }

  for (const sq of squares) {
    const isSource=sq.row===sourceR&&sq.col===sourceC, isTarget=sq.row===targetR&&sq.col===targetC;
    const terrain=grid[sq.row][sq.col];
    const sqElev=getElevation(terrain);
    if (!isSource&&!isTarget) {
      const occupant=characterAt(sq.row,sq.col,characters);
      if (occupant) return {result:"blocked",reason:`Blocked by "${occupant.name}" at (${sq.col},${sq.row})`,squares};
    }
    if (terrain==="blocking"&&!isSource&&!isTarget)
      return {result:"blocked",reason:`Blocked by ${blockingLabel(sq.row,sq.col)} at (${sq.col},${sq.row})`,squares};
    if (sameElevation&&!isSource&&!isTarget&&sqElev>sourceElev)
      return {result:"blocked",reason:`Blocked by higher elevation (lvl ${sqElev}) at (${sq.col},${sq.row})`,squares};
    if (!sameElevation&&!isSource&&!isTarget) {
      const lowerElev=Math.min(sourceElev,targetElev);
      if (terrain==="blocking") return {result:"blocked",reason:`Blocked by ${blockingLabel(sq.row,sq.col)} at (${sq.col},${sq.row})`,squares};
      if (sqElev>lowerElev) return {result:"blocked",reason:`Blocked by elevated terrain (lvl ${sqElev}) at (${sq.col},${sq.row})`,squares};
    }
    if (terrain==="hindering"&&!isSource) {
      if (!sameElevation) { if (isTarget) hindered=true; }
      else hindered=true;
    }
  }
  if (hindered) return {result:"hindered",reason:"LoF crosses hindering terrain (+1 DEF for range attacks)",squares};
  return {result:"clear",reason:"Clear line of fire",squares};
}

// ============================================================
// MAIN COMPONENT
// ============================================================
function HeroClixLoFTool() {
  const [gridCols, setGridCols] = useState(GRID_COLS);
  const [gridRows, setGridRows] = useState(GRID_ROWS);
  const [grid, setGrid] = useState(() => Array.from({length:GRID_ROWS},()=>Array(GRID_COLS).fill("clear")));
  const [walls, setWalls] = useState([]);
  const [characters, setCharacters] = useState([]);
  const [tool, setTool] = useState("terrain");
  const [terrainType, setTerrainType] = useState("hindering");
  const [lofSource, setLofSource] = useState(null);
  const [lofResult, setLofResult] = useState(null);
  const [charName, setCharName] = useState("Hero");
  const [mapName, setMapName] = useState("");
  const [savedMaps, setSavedMaps] = useState([]);
  const [isPainting, setIsPainting] = useState(false);
  const [showHelp, setShowHelp] = useState(false);
  const [mapType, setMapType] = useState("outdoor");
  const [indoorSquares, setIndoorSquares] = useState(() => new Set());
  const [transitionSquares, setTransitionSquares] = useState(() => new Set());
  const [folderMapped, setFolderMapped] = useState(false);
  const [parsing, setParsing] = useState(false);
  const [cellSize, setCellSize] = useState(() => computeCellSize(GRID_COLS));
  const parseRef = useRef(null);
  const touchPaintingRef = useRef(false);
  const lastTouchCellRef = useRef(null); // tracks last cell touched, used for LoF on touchEnd
  const gridRef = useRef(null);

  // Recompute cell size on resize
  useEffect(() => {
    const onResize = () => setCellSize(computeCellSize(GRID_COLS));
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  const LABEL_SIZE = Math.max(16, Math.floor(cellSize * 0.55));

  const isSquareIndoor = useCallback((row, col) => {
    if (mapType === "indoor") return true;
    if (mapType === "outdoor") return false;
    return indoorSquares.has(`${row},${col}`);
  }, [mapType, indoorSquares]);

  // Load saved maps on mount
  useEffect(() => {
    (async () => {
      try {
        const res = await window.storage.list("hcmap:");
        if (res && res.keys) {
          const names = res.keys.map(k => k.replace("hcmap:", ""));
          setSavedMaps(names);
          const lastSaved = sessionStorage.getItem("hcmap_last_saved");
          if (lastSaved && names.includes(lastSaved)) {
            sessionStorage.removeItem("hcmap_last_saved");
            try {
              const mapRes = await window.storage.get(`hcmap:${lastSaved}`);
              if (mapRes && mapRes.value) {
                const d = JSON.parse(mapRes.value);
                setGrid(d.grid); setWalls(d.walls||[]); setCharacters(d.characters||[]);
                setMapType(d.mapType||"outdoor");
                setIndoorSquares(new Set(d.indoorSquares||[]));
                setTransitionSquares(new Set(d.transitionSquares||[]));
                if (d.gridCols) { GRID_COLS=d.gridCols; setGridCols(d.gridCols); setCellSize(computeCellSize(d.gridCols)); }
                if (d.gridRows) { GRID_ROWS=d.gridRows; setGridRows(d.gridRows); }
                setMapName(lastSaved);
              }
            } catch(e2) {}
          }
        }
      } catch(e) {}
    })();
  }, []);

  const saveMap = useCallback(async () => {
    if (!mapName.trim()) return;
    const data = JSON.stringify({grid,walls,characters,mapType,indoorSquares:[...indoorSquares],transitionSquares:[...transitionSquares],gridCols,gridRows});
    try {
      await window.storage.set(`hcmap:${mapName.trim()}`, data);
      sessionStorage.setItem("hcmap_last_saved", mapName.trim());
      window.location.reload();
    } catch(e) {}
  }, [mapName,grid,walls,characters,mapType,indoorSquares,transitionSquares,gridCols,gridRows]);

  const loadMap = useCallback(async (name) => {
    try {
      const res = await window.storage.get(`hcmap:${name}`);
      if (res && res.value) {
        const d = JSON.parse(res.value);
        setGrid(d.grid); setWalls(d.walls||[]); setCharacters(d.characters||[]);
        setMapType(d.mapType||"outdoor");
        setIndoorSquares(new Set(d.indoorSquares||[]));
        setTransitionSquares(new Set(d.transitionSquares||[]));
        if (d.gridCols) { GRID_COLS=d.gridCols; setGridCols(d.gridCols); setCellSize(computeCellSize(d.gridCols)); }
        if (d.gridRows) { GRID_ROWS=d.gridRows; setGridRows(d.gridRows); }
        setMapName(name); setLofSource(null); setLofResult(null);
      }
    } catch(e) {}
  }, []);

  const deleteMap = useCallback(async (name) => {
    try {
      await window.storage.delete(`hcmap:${name}`);
      const res = await window.storage.list("hcmap:");
      if (res && res.keys) setSavedMaps(res.keys.map(k => k.replace("hcmap:","")));
    } catch(e) {}
  }, []);

  const handleParseMap = useCallback(async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setParsing(true);
    const parsedName = file.name.replace(/\.[^.]+$/,"");
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const result = await window.parseMapImage(ev.target.result);
        GRID_COLS=result.cols; GRID_ROWS=result.rows;
        setGridCols(result.cols); setGridRows(result.rows);
        setCellSize(computeCellSize(result.cols));
        const newGrid = Array.from({length:result.rows},(_,ri)=>
          Array.from({length:result.cols},(_,ci)=>result.grid[ri][ci]));
        setGrid(newGrid); setWalls(result.walls||[]); setCharacters([]);
        setIndoorSquares(new Set()); setTransitionSquares(new Set());
        setLofSource(null); setLofResult(null); setMapName(parsedName);
        const saveData = JSON.stringify({grid:newGrid,walls:result.walls||[],characters:[],mapType:"outdoor",indoorSquares:[],transitionSquares:[],gridCols:result.cols,gridRows:result.rows});
        await window.storage.set(`hcmap:${parsedName}`,saveData);
        const res = await window.storage.list("hcmap:");
        if (res && res.keys) setSavedMaps(res.keys.map(k=>k.replace("hcmap:","")));
      } catch(err) { console.error(err); }
      setParsing(false);
    };
    reader.readAsDataURL(file);
    e.target.value="";
  }, []);

  // ---- CELL ACTIONS ----
  const handleCellAction = useCallback((row, col, isDown=false) => {
    if (tool==="terrain") {
      setGrid(prev => { const next=prev.map(r=>[...r]); next[row][col]=terrainType; return next; });
    } else if (tool==="indoor") {
      const key=`${row},${col}`;
      setIndoorSquares(prev => { const next=new Set(prev); if (isDown?(next.has(key)?next.delete(key):next.add(key)):next.add(key)); return next; });
    } else if (tool==="transition"&&isDown) {
      const key=`${row},${col}`;
      setTransitionSquares(prev => { const next=new Set(prev); if (next.has(key)) next.delete(key); else next.add(key); return next; });
    } else if (tool==="clearTerrain") {
      setGrid(prev => { const next=prev.map(r=>[...r]); next[row][col]="clear"; return next; });
    } else if (tool==="erase") {
      setGrid(prev => { const next=prev.map(r=>[...r]); next[row][col]="clear"; return next; });
      setCharacters(prev => prev.filter(c=>!(c.row===row&&c.col===col)));
      setIndoorSquares(prev=>{ const next=new Set(prev); next.delete(`${row},${col}`); return next; });
      setTransitionSquares(prev=>{ const next=new Set(prev); next.delete(`${row},${col}`); return next; });
    } else if (tool==="character"&&isDown) {
      const exists=characters.find(c=>c.row===row&&c.col===col);
      if (!exists) {
        const color=CHARACTER_COLORS[characters.length%CHARACTER_COLORS.length];
        setCharacters(prev=>[...prev,{row,col,name:charName||`Char ${prev.length+1}`,color}]);
      }
    } else if (tool==="lof"&&isDown) {
      if (!lofSource) { setLofSource({row,col}); setLofResult(null); }
      else {
        const result=computeLoF(lofSource.row,lofSource.col,row,col,grid,walls,characters,isSquareIndoor);
        setLofResult(result); setLofSource(null);
      }
    }
  }, [tool,terrainType,charName,characters,lofSource,grid,walls,isSquareIndoor]);

  // Edge detection for wall tool — works with both mouse and touch coords
  const getEdgeFromCoords = (row, col, clientX, clientY, cellEl, cellSz, labelSz) => {
    const rect = cellEl.getBoundingClientRect();
    const x = clientX - rect.left, y = clientY - rect.top;
    const margin = cellSz * 0.28;
    if (y < margin) return "top";
    if (y > cellSz - margin) return "bottom";
    if (x < margin) return "left";
    if (x > cellSz - margin) return "right";
    return null;
  };

  const handleEdgeAction = useCallback((row, col, edge) => {
    let r2, c2;
    if (edge==="top") { r2=row-1; c2=col; }
    else if (edge==="bottom") { r2=row+1; c2=col; }
    else if (edge==="left") { r2=row; c2=col-1; }
    else { r2=row; c2=col+1; }
    if (r2<0||r2>=GRID_ROWS||c2<0||c2>=GRID_COLS) return;
    const key=wallKey(row,col,r2,c2);
    if (tool==="wall") setWalls(prev=>prev.includes(key)?prev:[...prev,key]);
    else if (tool==="eraseWall") setWalls(prev=>prev.filter(w=>w!==key));
  }, [tool]);

  // ---- TOUCH HANDLING ----
  // Convert a touch point to a grid cell
  const touchToCell = useCallback((touch) => {
    if (!gridRef.current) return null;
    const rect = gridRef.current.getBoundingClientRect();
    const x = touch.clientX - rect.left;
    const y = touch.clientY - rect.top;
    const cs = cellSize, ls = LABEL_SIZE;
    if (x < ls || y < ls) return null;
    const col = Math.floor((x - ls) / cs);
    const row = Math.floor((y - ls) / cs);
    if (row < 0 || row >= GRID_ROWS || col < 0 || col >= GRID_COLS) return null;
    return { row, col, clientX: touch.clientX, clientY: touch.clientY };
  }, [cellSize, LABEL_SIZE]);

  const handleTouchStart = useCallback((e) => {
    if (tool === "wall" || tool === "eraseWall") return;

    e.preventDefault();
    const touch = e.touches[0];
    const cell = touchToCell(touch);
    if (!cell) return;

    // For LoF: just record where the finger landed — commit on touchEnd
    if (tool === "lof") {
      lastTouchCellRef.current = cell;
      return;
    }

    // For paint tools: start painting immediately on touchStart
    touchPaintingRef.current = true;
    setIsPainting(true);
    handleCellAction(cell.row, cell.col, true);
  }, [tool, touchToCell, handleCellAction]);

  const handleTouchMove = useCallback((e) => {
    if (tool === "lof") {
      // Track the moving finger so touchEnd uses the final resting position
      e.preventDefault();
      const touch = e.touches[0];
      const cell = touchToCell(touch);
      if (cell) lastTouchCellRef.current = cell;
      return;
    }
    if (!touchPaintingRef.current) return;
    if (tool === "terrain" || tool === "clearTerrain" || tool === "erase" || tool === "indoor") {
      e.preventDefault();
      const touch = e.touches[0];
      const cell = touchToCell(touch);
      if (!cell) return;
      handleCellAction(cell.row, cell.col, false);
    }
  }, [tool, touchToCell, handleCellAction]);

  const handleTouchEnd = useCallback((e) => {
    // For LoF: commit the action using the last tracked cell on finger lift
    if (tool === "lof") {
      const cell = lastTouchCellRef.current;
      lastTouchCellRef.current = null;
      if (cell) handleCellAction(cell.row, cell.col, true);
      return;
    }
    touchPaintingRef.current = false;
    setIsPainting(false);
  }, [tool, handleCellAction]);

  const lofLineSquares = lofResult ? new Set(lofResult.squares.map(s=>s.key)) : new Set();
  const resultColor = lofResult
    ? (lofResult.result==="blocked"?"#e63946":lofResult.result==="hindered"?"#e9c46a":"#2a9d8f")
    : null;

  const gridW = gridCols * cellSize + LABEL_SIZE;
  const gridH = gridRows * cellSize + LABEL_SIZE;

  // ---- RENDER ----
  return (
    <div style={{display:"flex",flexDirection:"column",height:"100dvh",background:"linear-gradient(145deg,#0f0f23,#1a1a2e,#16213e)",fontFamily:"'JetBrains Mono',monospace",color:"#e0e0e0",overflow:"hidden"}}>

      {/* HEADER */}
      <div id="header" className="safe-top">
        <div>
          <div style={{fontSize:16,fontWeight:900,letterSpacing:1.5,textTransform:"uppercase",color:"#fff"}}>⚔ HeroClix LoF</div>
          <div style={{fontSize:9,opacity:0.75,color:"#ffe0e0"}}>Line of Fire Checker</div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          {lofResult && (
            <div style={{
              padding:"4px 10px",borderRadius:12,
              background:`${resultColor}20`,border:`1.5px solid ${resultColor}`,
              fontSize:11,fontWeight:900,color:resultColor,letterSpacing:1,textTransform:"uppercase",
            }}>
              {lofResult.result==="blocked"?"✕ BLOCKED":lofResult.result==="hindered"?"◐ HINDERED":"✓ CLEAR"}
            </div>
          )}
          <button
            onClick={()=>setShowHelp(h=>!h)}
            style={{padding:"6px 10px",border:"1px solid rgba(255,255,255,0.3)",borderRadius:8,background:"rgba(255,255,255,0.12)",color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer",minWidth:44,minHeight:36}}
          >
            {showHelp?"✕":"?"}
          </button>
        </div>
      </div>

      {/* HELP PANEL */}
      <div id="help-panel" className={showHelp?"":"hidden"}>
        <strong style={{color:"#e63946",fontSize:12}}>How to Use</strong><br/>
        <strong>Paint Terrain:</strong> Tap or drag on cells.<br/>
        <strong>Draw Wall:</strong> Tap a cell edge (top/bottom/left/right).<br/>
        <strong>Place Character:</strong> Set a name, then tap a cell.<br/>
        <strong>Check LoF:</strong> Tap source, then tap target. Result appears in the header.<br/>
        <strong>Parse PNG:</strong> Upload a HeroClix map image to auto-detect terrain.<br/>
        <strong>Save/Load:</strong> Use the action bar below the tools.<br/>
        <strong style={{color:"#2a9d8f"}}>LoF Rules: </strong>Blocking, hindering, walls, elevation, diagonal intersections, rim rule — all per 2025 Comprehensive Rules.
      </div>

      {/* LoF RESULT DETAIL (shown below header when result exists) */}
      {lofResult && (
        <div style={{
          padding:"8px 14px",background:`${resultColor}10`,borderBottom:`2px solid ${resultColor}`,
          fontSize:11,color:"#bbb",display:"flex",alignItems:"center",gap:10,flexShrink:0,
        }}>
          <span style={{flex:1,lineHeight:1.4}}>{lofResult.reason}</span>
          <button
            onClick={()=>{setLofResult(null);setLofSource(null);}}
            style={{padding:"4px 10px",border:"none",borderRadius:6,background:"#333",color:"#ccc",fontSize:11,cursor:"pointer",flexShrink:0}}
          >Dismiss</button>
        </div>
      )}

      {/* GRID SCROLL AREA */}
      <div
        id="grid-scroll"
        style={{flex:1,overflow:"auto",WebkitOverflowScrolling:"touch"}}
      >
        <div style={{padding:"10px 10px 0",display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",marginBottom:6}}>
          {/* Map size buttons */}
          <button
            onClick={()=>{GRID_COLS=16;GRID_ROWS=16;setGridCols(16);setGridRows(16);setCellSize(computeCellSize(16));setGrid(Array.from({length:16},()=>Array(16).fill("clear")));setWalls([]);setCharacters([]);setIndoorSquares(new Set());setTransitionSquares(new Set());setLofSource(null);setLofResult(null);}}
            style={{padding:"5px 10px",border:`1.5px solid ${gridRows===16?"#f4a261":"#444"}`,borderRadius:8,background:gridRows===16?"rgba(244,162,97,0.15)":"#1a1a2e",color:gridRows===16?"#f4a261":"#888",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}
          >16×16</button>
          <button
            onClick={()=>{GRID_COLS=16;GRID_ROWS=24;setGridCols(16);setGridRows(24);setCellSize(computeCellSize(16));setGrid(prev=>Array.from({length:24},(_,ri)=>Array.from({length:16},(_,ci)=>ri<prev.length&&ci<(prev[0]||[]).length?prev[ri][ci]:"clear")));setLofSource(null);setLofResult(null);}}
            style={{padding:"5px 10px",border:`1.5px solid ${gridRows===24?"#f4a261":"#444"}`,borderRadius:8,background:gridRows===24?"rgba(244,162,97,0.15)":"#1a1a2e",color:gridRows===24?"#f4a261":"#888",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}
          >16×24</button>
          <button
            onClick={()=>{setGrid(Array.from({length:gridRows},()=>Array(gridCols).fill("clear")));setWalls([]);setCharacters([]);setIndoorSquares(new Set());setTransitionSquares(new Set());setLofSource(null);setLofResult(null);}}
            style={{padding:"5px 10px",border:"1.5px solid #444",borderRadius:8,background:"#1a1a2e",color:"#e63946",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}
          >Clear</button>
          <button
            onClick={()=>parseRef.current?.click()}
            disabled={parsing}
            style={{padding:"5px 10px",border:"1.5px solid #6a4c93",borderRadius:8,background:"rgba(106,76,147,0.15)",color:"#b09ccc",fontSize:11,fontWeight:700,cursor:"pointer",opacity:parsing?0.6:1,fontFamily:"'JetBrains Mono',monospace"}}
          >{parsing?"Parsing…":"⚡ Parse PNG"}</button>
          <input ref={parseRef} type="file" accept="image/png,image/jpeg,image/webp" onChange={handleParseMap} style={{display:"none"}}/>
          {/* Map type indicator */}
          <div style={{marginLeft:"auto",fontSize:10,color:"#666",fontFamily:"'JetBrains Mono',monospace"}}>
            {mapType==="indoor"?"🏠 Indoor":mapType==="outdoor_indoor"?"🏗 Mix":"🌤 Outdoor"}
          </div>
        </div>

        {/* THE GRID */}
        <div style={{padding:"0 10px 10px"}}>
          <div
            ref={gridRef}
            style={{
              position:"relative",
              width:gridW,
              height:gridH,
              border:"2px solid #444",
              borderRadius:4,
              overflow:"hidden",
              background:"#1e1e30",
              cursor: tool==="lof"?"crosshair":tool==="wall"||tool==="eraseWall"?"cell":"pointer",
              touchAction: (tool==="terrain"||tool==="clearTerrain"||tool==="erase"||tool==="indoor")?"none":"auto",
              userSelect:"none",
            }}
            onMouseLeave={()=>setIsPainting(false)}
            onMouseUp={()=>setIsPainting(false)}
            onTouchStart={handleTouchStart}
            onTouchMove={handleTouchMove}
            onTouchEnd={handleTouchEnd}
            onTouchCancel={handleTouchEnd}
          >
            {/* Column labels */}
            {Array.from({length:gridCols},(_,ci)=>(
              <div key={`col-${ci}`} style={{position:"absolute",left:LABEL_SIZE+ci*cellSize,top:0,width:cellSize,height:LABEL_SIZE,display:"flex",alignItems:"center",justifyContent:"center",fontSize:Math.max(7,Math.floor(cellSize*0.26)),fontWeight:700,color:"#555"}}>
                {String.fromCharCode(65+ci)}
              </div>
            ))}
            {/* Row labels */}
            {Array.from({length:gridRows},(_,ri)=>(
              <div key={`row-${ri}`} style={{position:"absolute",left:0,top:LABEL_SIZE+ri*cellSize,width:LABEL_SIZE,height:cellSize,display:"flex",alignItems:"center",justifyContent:"center",fontSize:Math.max(7,Math.floor(cellSize*0.26)),fontWeight:700,color:"#555"}}>
                {ri+1}
              </div>
            ))}

            {/* Grid cells */}
            {grid.map((row,ri)=>row.map((cell,ci)=>{
              const t=TERRAIN[cell]||TERRAIN.clear;
              const isLofSquare=lofLineSquares.has(`${ri},${ci}`);
              const isSource=lofSource&&lofSource.row===ri&&lofSource.col===ci;
              const isIndoor=isSquareIndoor(ri,ci);
              const isTransition=transitionSquares.has(`${ri},${ci}`);
              return (
                <div
                  key={`${ri}-${ci}`}
                  style={{
                    position:"absolute",
                    left:LABEL_SIZE+ci*cellSize,top:LABEL_SIZE+ri*cellSize,
                    width:cellSize,height:cellSize,
                    background:t.color,
                    borderRight:"1px solid rgba(255,255,255,0.04)",
                    borderBottom:"1px solid rgba(255,255,255,0.04)",
                    boxSizing:"border-box",
                    display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:Math.max(8,Math.floor(cellSize*0.32)),
                    color:"rgba(255,255,255,0.5)",
                    userSelect:"none",
                    outline:isSource?"3px solid #f4a261":isLofSquare?`2px solid ${resultColor}`:isIndoor&&mapType==="outdoor_indoor"?"2px solid rgba(230,200,50,0.7)":"none",
                    outlineOffset:-2,
                    zIndex:isSource||isLofSquare?2:1,
                  }}
                  onMouseDown={(e)=>{
                    if (tool==="wall"||tool==="eraseWall") {
                      const edge=getEdgeFromCoords(ri,ci,e.clientX,e.clientY,e.currentTarget,cellSize,LABEL_SIZE);
                      if (edge) handleEdgeAction(ri,ci,edge);
                    } else {
                      setIsPainting(true);
                      handleCellAction(ri,ci,true);
                    }
                  }}
                  onMouseEnter={()=>{
                    if (isPainting&&(tool==="terrain"||tool==="clearTerrain"||tool==="erase"||tool==="indoor"))
                      handleCellAction(ri,ci,false);
                  }}
                  onTouchStart={(e)=>{
                    if (tool==="wall"||tool==="eraseWall") {
                      e.preventDefault();
                      const touch=e.touches[0];
                      const edge=getEdgeFromCoords(ri,ci,touch.clientX,touch.clientY,e.currentTarget,cellSize,LABEL_SIZE);
                      if (edge) handleEdgeAction(ri,ci,edge);
                    }
                    // Other tools handled by grid-level touch handler
                  }}
                >
                  {cell!=="clear"&&<span style={{fontSize:Math.max(8,Math.floor(cellSize*0.3)),opacity:0.65}}>{t.icon}</span>}
                  {isIndoor&&mapType==="outdoor_indoor"&&(
                    <span style={{position:"absolute",top:1,right:2,fontSize:6,color:"rgba(230,200,50,0.8)",fontWeight:900}}>IN</span>
                  )}
                  {isTransition&&(
                    <svg style={{position:"absolute",top:2,left:2,width:cellSize-4,height:cellSize-4,pointerEvents:"none"}} viewBox="0 0 30 30">
                      <polygon points="15,3 27,15 15,27 3,15" fill="rgba(255,255,255,0.35)" stroke="#c44" strokeWidth="2"/>
                    </svg>
                  )}
                </div>
              );
            }))}

            {/* Walls */}
            {walls.map(w=>{
              const parts=w.split("-");
              const [r1,c1]=parts[0].split(",").map(Number);
              const [r2,c2]=parts[1].split(",").map(Number);
              const isHoriz=c1===c2;
              if (isHoriz) {
                const topR=Math.max(r1,r2);
                return <div key={w} style={{position:"absolute",left:LABEL_SIZE+c1*cellSize-1,top:LABEL_SIZE+topR*cellSize-WALL_STYLE.width/2,width:cellSize+2,height:WALL_STYLE.width,background:WALL_STYLE.color,zIndex:5,pointerEvents:"none",borderRadius:1}}/>;
              } else {
                const leftC=Math.max(c1,c2);
                return <div key={w} style={{position:"absolute",left:LABEL_SIZE+leftC*cellSize-WALL_STYLE.width/2,top:LABEL_SIZE+r1*cellSize-1,width:WALL_STYLE.width,height:cellSize+2,background:WALL_STYLE.color,zIndex:5,pointerEvents:"none",borderRadius:1}}/>;
              }
            })}

            {/* Characters */}
            {characters.map((ch,i)=>(
              <div key={i} style={{
                position:"absolute",
                left:LABEL_SIZE+ch.col*cellSize+2,top:LABEL_SIZE+ch.row*cellSize+2,
                width:cellSize-4,height:cellSize-4,
                borderRadius:"50%",
                background:`radial-gradient(circle at 35% 35%,${ch.color}dd,${ch.color}88)`,
                border:`2px solid ${ch.color}`,
                boxShadow:`0 0 6px ${ch.color}66`,
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:Math.max(7,Math.floor(cellSize*0.22)),fontWeight:900,color:"#fff",
                textShadow:"0 1px 2px rgba(0,0,0,0.8)",
                zIndex:10,pointerEvents:"none",
              }} title={ch.name}>
                {ch.name.slice(0,3).toUpperCase()}
              </div>
            ))}

            {/* LoF SVG line */}
            {lofResult&&lofResult.squares.length>=2&&(()=>{
              const first=lofResult.squares[0], last=lofResult.squares[lofResult.squares.length-1];
              const x1=LABEL_SIZE+first.col*cellSize+cellSize/2, y1=LABEL_SIZE+first.row*cellSize+cellSize/2;
              const x2=LABEL_SIZE+last.col*cellSize+cellSize/2, y2=LABEL_SIZE+last.row*cellSize+cellSize/2;
              return (
                <svg style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:15}}>
                  <line x1={x1} y1={y1} x2={x2} y2={y2} stroke={resultColor} strokeWidth={2.5}
                    strokeDasharray={lofResult.result==="blocked"?"6,4":lofResult.result==="hindered"?"8,3":"none"} opacity={0.85}/>
                  <circle cx={x1} cy={y1} r={4} fill="#f4a261" stroke="#fff" strokeWidth={1.5}/>
                  <circle cx={x2} cy={y2} r={4} fill={resultColor} stroke="#fff" strokeWidth={1.5}/>
                </svg>
              );
            })()}

            {/* LoF source pulse */}
            {lofSource&&!lofResult&&(
              <svg style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:15}}>
                <circle cx={LABEL_SIZE+lofSource.col*cellSize+cellSize/2} cy={LABEL_SIZE+lofSource.row*cellSize+cellSize/2} r={7} fill="none" stroke="#f4a261" strokeWidth={2.5}>
                  <animate attributeName="r" values="5;9;5" dur="1.2s" repeatCount="indefinite"/>
                </circle>
              </svg>
            )}
          </div>
        </div>

        {/* Legend */}
        <div style={{padding:"0 10px 8px",display:"flex",gap:8,flexWrap:"wrap",fontSize:10,color:"#666"}}>
          {Object.entries(TERRAIN).map(([key,t])=>(
            <div key={key} style={{display:"flex",alignItems:"center",gap:3}}>
              <div style={{width:12,height:12,borderRadius:2,background:t.color,border:`1px solid ${t.border}`}}/>
              {t.label}
            </div>
          ))}
          <div style={{display:"flex",alignItems:"center",gap:3}}>
            <div style={{width:12,height:4,background:"#1a1a1a",borderRadius:1}}/>Wall
          </div>
        </div>

        {/* Character list */}
        {characters.length>0&&(
          <div style={{padding:"0 10px 10px",display:"flex",gap:6,flexWrap:"wrap"}}>
            {characters.map((ch,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:5,background:"#12122a",border:"1px solid #2a2a4a",borderRadius:16,padding:"3px 10px 3px 5px"}}>
                <div style={{width:14,height:14,borderRadius:"50%",background:ch.color,border:"1px solid #fff3"}}/>
                <span style={{fontSize:10,color:"#ccc"}}>{ch.name}</span>
                <button onClick={()=>setCharacters(prev=>prev.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:"#e63946",cursor:"pointer",fontSize:13,padding:"0 2px",lineHeight:1}}>×</button>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* BOTTOM TOOLBAR */}
      <div id="bottom-bar" className="safe-bottom">

        {/* Tool pills */}
        <div className="tool-scroll">
          {[
            {key:"terrain",label:"Paint"},
            {key:"clearTerrain",label:"Erase Terrain"},
            {key:"wall",label:"Wall"},
            {key:"eraseWall",label:"Erase Wall"},
            {key:"character",label:"Character"},
            {key:"lof",label:"⚔ LoF"},
            {key:"erase",label:"Erase All"},
            ...(mapType==="outdoor_indoor"?[{key:"transition",label:"Transition"},{key:"indoor",label:"Mark Indoor"}]:[]),
          ].map(({key,label})=>(
            <button
              key={key}
              className={`tool-pill ${tool===key?"active":""}`}
              onClick={()=>{setTool(key);setLofSource(null);setLofResult(null);}}
            >{label}</button>
          ))}
        </div>

        {/* Secondary options row — context sensitive */}
        <div className={`option-scroll ${tool!=="terrain"&&tool!=="character"&&tool!=="lof"&&tool!=="wall"&&mapType==="outdoor"?"hidden":""}`}>
          {/* Terrain type picker */}
          {tool==="terrain"&&Object.entries(TERRAIN).filter(([k])=>k!=="clear").map(([key,t])=>(
            <button
              key={key}
              className={`opt-pill ${terrainType===key?"active-terrain":""}`}
              style={terrainType===key?{background:t.color,borderColor:t.border,color:"#fff"}:{}}
              onClick={()=>setTerrainType(key)}
            >{t.icon} {t.label}</button>
          ))}
          {/* Character name */}
          {tool==="character"&&(
            <>
              <span style={{fontSize:11,color:"#666",alignSelf:"center",flexShrink:0}}>Name:</span>
              <input className="char-input" value={charName} onChange={e=>setCharName(e.target.value)} placeholder="Hero name"/>
            </>
          )}
          {/* LoF status */}
          {tool==="lof"&&(
            <div style={{fontSize:11,color:lofSource?"#f4a261":"#888",alignSelf:"center",padding:"0 4px"}}>
              {!lofSource?"Tap SOURCE square on map":"Now tap TARGET square"}
            </div>
          )}
          {/* Wall tip */}
          {(tool==="wall"||tool==="eraseWall")&&(
            <div style={{fontSize:11,color:"#888",alignSelf:"center",padding:"0 4px"}}>
              Tap near a cell edge to {tool==="wall"?"place":"remove"} wall
            </div>
          )}
          {/* Map type */}
          {["outdoor","indoor","outdoor_indoor"].map(mt=>(
            <button
              key={mt}
              className={`opt-pill ${mapType===mt?"active":""}`}
              onClick={()=>setMapType(mt)}
            >
              {mt==="outdoor"?"🌤 Out":mt==="indoor"?"🏠 In":"🏗 Mix"}
            </button>
          ))}
        </div>

        {/* Action bar — save/load */}
        <div className="action-bar">
          <input
            className="map-input"
            value={mapName}
            onChange={e=>setMapName(e.target.value)}
            placeholder="Map name…"
          />
          <button className="action-btn" style={{background:"#2a9d8f"}} onClick={saveMap}>Save</button>
          {savedMaps.length>0&&(
            <select className="map-select" onChange={e=>e.target.value&&loadMap(e.target.value)} value="">
              <option value="">Load…</option>
              {savedMaps.map(n=><option key={n} value={n}>{n}</option>)}
            </select>
          )}
          {savedMaps.length>0&&(
            <select className="map-select" style={{color:"#e07070",background:"#2a1a1a"}} onChange={e=>e.target.value&&deleteMap(e.target.value)} value="">
              <option value="">Delete…</option>
              {savedMaps.map(n=><option key={n} value={n}>{n}</option>)}
            </select>
          )}
          {window.storage.isFileSystemSupported&&(
            folderMapped
              ? <><span style={{fontSize:10,color:"#2a9d8f",whiteSpace:"nowrap"}}>📁 {window.storage.folderName}</span>
                  <button className="action-btn" style={{background:"#555"}} onClick={()=>{window.storage.unmapFolder();setFolderMapped(false);}}>Unlink</button></>
              : <button className="action-btn" style={{background:"#457b9d"}} onClick={async()=>{const ok=await window.storage.mapFolder();if(ok){setFolderMapped(true);const res=await window.storage.list("hcmap:");if(res&&res.keys)setSavedMaps(res.keys.map(k=>k.replace("hcmap:","")))};}}>📁 Folder</button>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(HeroClixLoFTool));
</script>
</body>
</html>
